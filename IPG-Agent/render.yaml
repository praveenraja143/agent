services:
  - type: web
    name: ipg-agent
    env: docker
    region: oregon 
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WHATSAPP_PHONE
        sync: false
      - key: SKILLS
        value: "Python,JavaScript,React,Node.js,Machine Learning,Data Analysis"
      - key: LOCATIONS
        value: "Chennai,Bangalore,Remote"
